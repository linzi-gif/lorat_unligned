name: "DINOv2/B-224"

logging:
  category: "LoRAT"
  tags:
    - "DINOv2"
    - "base"
    - "224"
    - "LoRA"

type: "LoRAT"

common:
  template_size: [ 112, 112 ]
  search_region_size: [ 224, 224 ]
  template_feat_size: [ 8, 8 ]
  search_region_feat_size: &search_region_feat_size [ 16, 16 ]
  response_map_size: *search_region_feat_size
  interpolation_mode: "bilinear"
  interpolation_align_corners: false
  normalization: "mm"

model:
  type: "dinov2"
  backbone:
    type: "DINOv2"
    parameters:
      name: "ViT-B/14"
      acc: "default"
  lora:
    r: 64
    alpha: 64
    dropout: 0.
    use_rslora: false
  target_landmark_relation:
    build_layer: 5
    refresh_layer: 8
    refine_layers: [ 11 ]
    inject_layers: [ 8 ]
    num_landmarks: 8
    match_candidate_topk: 4
    min_landmark_distance: 2.0
    route_full_threshold: 0.62
    route_weak_threshold: 0.38
    identity_refine_scale: 0.10
    pair_refresh_conf_threshold: 0.35
    pair_refresh_min_improvement: 0.02
    prompt_heads: 8
    enable_identity_memory: true
    
run: !include "../run.yaml"
